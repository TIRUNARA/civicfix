<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 740" width="100%" height="100%">
  <defs>
    <!-- Import Google Font -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', monospace; }
      .title { fill: #f8fafc; font-size: 18px; font-weight: 700; }
      .subtitle { fill: #94a3b8; font-size: 11px; }
      .group-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
      .node-title { fill: #ffffff; font-size: 12px; font-weight: 600; }
      .node-desc { fill: #94a3b8; font-size: 9px; }
      .arrow-text { fill: #64748b; font-size: 8px; font-weight: 500; }
      .glow { filter: drop-shadow(0px 0px 8px rgba(34, 211, 238, 0.3)); }
      .glow-emerald { filter: drop-shadow(0px 0px 8px rgba(52, 211, 153, 0.3)); }
      .glow-violet { filter: drop-shadow(0px 0px 8px rgba(167, 139, 250, 0.3)); }
      .glow-amber { filter: drop-shadow(0px 0px 8px rgba(251, 191, 36, 0.3)); }
    </style>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>

    <!-- Colored Markers -->
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-slate" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title Block -->
  <g transform="translate(30, 45)">
    <rect x="-10" y="-20" width="360" height="50" rx="6" fill="rgba(30, 41, 59, 0.4)" stroke="#334155" stroke-width="1"/>
    <text x="15" y="10" class="title">CivicFix Architecture Blueprint</text>
    <text x="15" y="24" class="subtitle">4-Stage Role-Gated Infrastructure Resolution Pipeline</text>
  </g>

  <!-- Legend -->
  <g transform="translate(770, 25)">
    <rect width="320" height="50" rx="6" fill="rgba(15, 23, 42, 0.8)" stroke="#1e293b" stroke-width="1"/>
    <circle cx="20" cy="18" r="5" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="32" y="21" fill="#94a3b8" font-size="8" font-weight="600">Citizen/UI</text>

    <circle cx="100" cy="18" r="5" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
    <text x="112" y="21" fill="#94a3b8" font-size="8" font-weight="600">Service/Logic</text>

    <circle cx="190" cy="18" r="5" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="202" y="21" fill="#94a3b8" font-size="8" font-weight="600">Database</text>

    <circle cx="270" cy="18" r="5" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="282" y="21" fill="#94a3b8" font-size="8" font-weight="600">Officer Gate</text>
  </g>

  <!-- ==================== REGION BOUNDARIES / COLUMNS ==================== -->
  
  <!-- Column 1: Citizen Submission -->
  <rect x="30" y="90" width="240" height="390" rx="12" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="45" y="112" fill="#22d3ee" class="group-label">Stage 1: Citizen Submission</text>

  <!-- Column 2: Dept Routing / AI -->
  <rect x="300" y="90" width="240" height="390" rx="12" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="315" y="112" fill="#34d399" class="group-label">Stage 2: AI Audit &amp; Routing</text>

  <!-- Column 3: Field Diagnostic -->
  <rect x="570" y="90" width="240" height="390" rx="12" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="585" y="112" fill="#fbbf24" class="group-label">Stage 3: Field Inspection</text>

  <!-- Column 4: Crew Resolution -->
  <rect x="840" y="90" width="250" height="390" rx="12" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="855" y="112" fill="#fb7185" class="group-label">Stage 4: Fixer Resolution</text>


  <!-- ==================== FLOW CONNECTORS (Drawn first to sit behind nodes) ==================== -->
  
  <!-- Citizen Map to AI Classifier -->
  <path d="M 245 180 L 325 180" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="285" y="173" class="arrow-text" text-anchor="middle">HTTP POST</text>

  <!-- QR Session to Citizen Map -->
  <path d="M 150 280 L 150 220" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <text x="156" y="250" class="arrow-text" text-anchor="start">Sync Draft</text>

  <!-- AI to Officer Approval -->
  <path d="M 425 210 L 425 280" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="430" y="248" class="arrow-text">Routes Dept</text>

  <!-- Officer Approval to Reviewer Assign -->
  <path d="M 515 310 L 595 310" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="555" y="303" class="arrow-text" text-anchor="middle">Dispatches</text>

  <!-- Reviewer Analysis to Officer Approval Gate (Awaiting Review Approval) -->
  <path d="M 695 340 L 695 440 L 425 440 L 425 340" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-slate)"/>
  <text x="560" y="433" class="arrow-text" text-anchor="middle">Awaiting Officer Diagnostic Approval</text>

  <!-- Officer approves Reviewer Diagnostic -> Fixer assigned -->
  <path d="M 470 340 L 470 410 L 965 410 L 965 340" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="717" y="403" class="arrow-text" text-anchor="middle">Triggers Fixer Dispatch</text>

  <!-- FastAPI to Database Layer -->
  <path d="M 560 575 L 560 610" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-violet)"/>
  
  <!-- DB Router to SQLite -->
  <path d="M 490 645 L 435 645" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="462" y="638" class="arrow-text" text-anchor="middle">Local</text>

  <!-- DB Router to Neon PG -->
  <path d="M 630 645 L 685 645" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="657" y="638" class="arrow-text" text-anchor="middle">Production</text>

  <!-- Node Interactions to FastAPI Backend (FastAPI is at y=510) -->
  <!-- Map -> API -->
  <path d="M 150 210 L 150 540 L 360 540" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-slate)"/>
  
  <!-- Officer -> API -->
  <path d="M 390 340 L 390 510" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-slate)"/>
  
  <!-- Reviewer -> API -->
  <path d="M 650 340 L 650 510" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-slate)"/>

  <!-- Fixer -> API -->
  <path d="M 965 340 L 965 540 L 740 540" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-slate)"/>


  <!-- ==================== COMPONENT BOXES (NODES) ==================== -->

  <!-- Node 1.1: Citizen UI Map -->
  <g transform="translate(55, 150)">
    <rect x="0" y="0" width="190" height="60" rx="6" fill="#0f172a"/>
    <rect x="0" y="0" width="190" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5" class="glow"/>
    <text x="95" y="22" class="node-title" text-anchor="middle">Citizen Map Portal</text>
    <text x="95" y="38" class="node-desc" text-anchor="middle">Submit &amp; Upvote Reports</text>
    <text x="95" y="49" fill="#22d3ee" font-size="7" font-weight="600" text-anchor="middle">MAP.HTML &amp; DASHBOARD.HTML</text>
  </g>

  <!-- Node 1.2: QR Camera Session -->
  <g transform="translate(55, 280)">
    <rect x="0" y="0" width="190" height="60" rx="6" fill="#0f172a"/>
    <rect x="0" y="0" width="190" height="60" rx="6" fill="rgba(30, 41, 59, 0.4)" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="95" y="22" class="node-title" text-anchor="middle">QR Camera Capture</text>
    <text x="95" y="38" class="node-desc" text-anchor="middle">Mobile quick photo upload</text>
    <text x="95" y="49" fill="#94a3b8" font-size="7" font-weight="600" text-anchor="middle">QR_SESSIONS TOKEN SYNC</text>
  </g>

  <!-- Node 2.1: Gemini AI Classifier -->
  <g transform="translate(325, 150)">
    <rect x="0" y="0" width="190" height="60" rx="6" fill="#0f172a"/>
    <rect x="0" y="0" width="190" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5" class="glow-emerald"/>
    <text x="95" y="22" class="node-title" text-anchor="middle">Gemini AI Engine</text>
    <text x="95" y="38" class="node-desc" text-anchor="middle">Automatic classification</text>
    <text x="95" y="49" fill="#34d399" font-size="7" font-weight="600" text-anchor="middle">DEPT, SEVERITY &amp; SLA</text>
  </g>

  <!-- Node 2.2: Officer Portal -->
  <g transform="translate(325, 280)">
    <rect x="0" y="0" width="190" height="60" rx="6" fill="#0f172a"/>
    <rect x="0" y="0" width="190" height="60" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5" class="glow-amber"/>
    <text x="95" y="22" class="node-title" text-anchor="middle">Officer Gatekeeper</text>
    <text x="95" y="38" class="node-desc" text-anchor="middle">Approve AI routing &amp; reviews</text>
    <text x="95" y="49" fill="#fbbf24" font-size="7" font-weight="600" text-anchor="middle">REPORT_APPROVALS TABLE</text>
  </g>

  <!-- Node 3.1: Reviewer Portal -->
  <g transform="translate(595, 280)">
    <rect x="0" y="0" width="190" height="60" rx="6" fill="#0f172a"/>
    <rect x="0" y="0" width="190" height="60" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5" class="glow-amber"/>
    <text x="95" y="22" class="node-title" text-anchor="middle">Reviewer Portal</text>
    <text x="95" y="38" class="node-desc" text-anchor="middle">Diagnostic field reports</text>
    <text x="95" y="49" fill="#fbbf24" font-size="7" font-weight="600" text-anchor="middle">REVIEWER_ASSIGNMENTS</text>
  </g>

  <!-- Node 4.1: Fixer Portal -->
  <g transform="translate(870, 280)">
    <rect x="0" y="0" width="190" height="60" rx="6" fill="#0f172a"/>
    <rect x="0" y="0" width="190" height="60" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
    <text x="95" y="22" class="node-title" text-anchor="middle">Fixer Portal</text>
    <text x="95" y="38" class="node-desc" text-anchor="middle">Resolution team upload</text>
    <text x="95" y="49" fill="#fb7185" font-size="7" font-weight="600" text-anchor="middle">FIXER_ASSIGNMENTS &amp; RESOLVED</text>
  </g>

  <!-- ==================== BACKEND GATEWAY LAYER ==================== -->
  
  <!-- Node: FastAPI Gateway -->
  <g transform="translate(360, 510)">
    <rect x="0" y="0" width="380" height="65" rx="6" fill="#0f172a"/>
    <rect x="0" y="0" width="380" height="65" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5" class="glow-emerald"/>
    <text x="190" y="22" class="node-title" text-anchor="middle">FastAPI Core Backend (main.py)</text>
    <text x="190" y="38" class="node-desc" text-anchor="middle">State Machine Transitions &amp; API Gateways</text>
    <text x="190" y="50" fill="#34d399" font-size="8" font-weight="600" text-anchor="middle">JWT AUTH, BASE64 IMAGE OPTIMIZER &amp; ROUTING ENGINE</text>
  </g>


  <!-- ==================== DATABASE STORAGE LAYER ==================== -->

  <!-- Node: DB Router -->
  <g transform="translate(450, 615)">
    <rect x="0" y="0" width="200" height="60" rx="4" fill="#0f172a"/>
    <rect x="0" y="0" width="200" height="60" rx="4" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5" class="glow-violet"/>
    <text x="100" y="24" class="node-title" text-anchor="middle">DB Adapter (database.py)</text>
    <text x="100" y="40" class="node-desc" text-anchor="middle">Auto-routing &amp; Auto-seeding</text>
  </g>

  <!-- Node: SQLite -->
  <g transform="translate(290, 615)">
    <rect x="0" y="10" width="130" height="40" rx="2" fill="#0f172a"/>
    <ellipse cx="65" cy="10" rx="65" ry="8" fill="#0f172a"/>
    <ellipse cx="65" cy="50" rx="65" ry="8" fill="#0f172a"/>
    <rect x="0" y="10" width="130" height="40" fill="rgba(76, 29, 149, 0.4)"/>
    <ellipse cx="65" cy="10" rx="65" ry="8" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
    <ellipse cx="65" cy="50" rx="65" ry="8" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
    <line x1="0" y1="10" x2="0" y2="50" stroke="#a78bfa" stroke-width="1"/>
    <line x1="130" y1="10" x2="130" y2="50" stroke="#a78bfa" stroke-width="1"/>
    <text x="65" y="32" fill="white" font-size="10" font-weight="600" text-anchor="middle">SQLite DB</text>
    <text x="65" y="44" fill="#94a3b8" font-size="8" text-anchor="middle">Local fallback</text>
  </g>

  <!-- Node: Neon Postgres -->
  <g transform="translate(680, 615)">
    <rect x="0" y="10" width="130" height="40" rx="2" fill="#0f172a"/>
    <ellipse cx="65" cy="10" rx="65" ry="8" fill="#0f172a"/>
    <ellipse cx="65" cy="50" rx="65" ry="8" fill="#0f172a"/>
    <rect x="0" y="10" width="130" height="40" fill="rgba(76, 29, 149, 0.4)"/>
    <ellipse cx="65" cy="10" rx="65" ry="8" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
    <ellipse cx="65" cy="50" rx="65" ry="8" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
    <line x1="0" y1="10" x2="0" y2="50" stroke="#a78bfa" stroke-width="1"/>
    <line x1="130" y1="10" x2="130" y2="50" stroke="#a78bfa" stroke-width="1"/>
    <text x="65" y="32" fill="white" font-size="10" font-weight="600" text-anchor="middle">Neon Postgres</text>
    <text x="65" y="44" fill="#94a3b8" font-size="8" text-anchor="middle">Production Cloud</text>
  </g>

</svg>
