version: 2
updates:
  # 1. Group all Python requirements.txt dependencies into a single PR
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*" # Matches all python packages
    open-pull-requests-limit: 1

  # 2. Group all Docker container base image updates into a single PR
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker-dependencies:
        patterns:
          - "*" # Matches all Docker dependencies
    open-pull-requests-limit: 1
